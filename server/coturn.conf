# Coturn TURN/STUN Server Configuration
# Para teleconsulta WebRTC

# Listening port for TURN/STUN
listening-port=3478

# Listening port for TURN/STUN over TLS
tls-listening-port=5349

# Relay ports range
min-port=49152
max-port=65535

# Verbose logging (desabilitar em produção)
verbose

# Realm usado para autenticação
realm=teleconsulta.local

# Endereço IP externo do servidor (SUBSTITUIR pelo IP público do servidor)
# external-ip=SEU_IP_PUBLICO_AQUI

# Usuário e senha para autenticação TURN (ALTERAR em produção)
user=teleconsulta:senha_segura_aqui

# Usar fingerprint
fingerprint

# Usar long-term credentials
lt-cred-mech

# Certificados SSL (serão gerados pelo script de setup)
cert=/etc/coturn/certs/cert.pem
pkey=/etc/coturn/certs/key.pem

# Permitir conexões de qualquer origem (ajustar conforme necessário)
no-multicast-peers

# Desabilitar STUN/TURN sobre UDP se necessário (manter habilitado por padrão)
# no-udp

# Desabilitar STUN/TURN sobre TCP se necessário (manter habilitado por padrão)
# no-tcp

# Log file
log-file=/var/log/coturn/coturn.log

# Não usar SQLite/PostgreSQL/MySQL/Redis para armazenamento
no-auth

# Permitir loopback peers (útil para testes locais)
allow-loopback-peers

# Negar peers privados em produção (comentar para testes locais)
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255
